    <h2>搜尋旅遊行程</h2>

    <form id="searchForm" class="search-form">
        <div class="form-group">
            <label>出發地</label>
            <input type="text" id="fromInput" placeholder="例如：台北">
        </div>

        <div class="form-group">
            <label>目的地</label>
            <input type="text" id="toInput" placeholder="例如:埃及、肯亞">
        </div>

        <div class="form-group">
            <label>出發日期</label>
            <input type="date" id="startDate">
        </div>

        <div class="form-group">
            <label>回程日期</label>
            <input type="date" id="endDate">
        </div>

        <button type="submit">搜尋</button>
    </form>
    </div>

    <div class="trip-section">
    <div class="trip-card" data-from="台北" data-to="埃及" data-start="2026-04-01" data-end="2026-04-13">

<script>
const form = document.getElementById("searchForm");

form.addEventListener("submit", function(e) {
    e.preventDefault(); // 防止表單自動刷新

    const from = document.getElementById("fromInput").value.toLowerCase();
    const to = document.getElementById("toInput").value.toLowerCase();
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    const trips = document.querySelectorAll(".trip-card");
    trips.forEach(trip => {
        const tripFrom = trip.dataset.from.toLowerCase();
        const tripTo = trip.dataset.to.toLowerCase();
        const tripStart = trip.dataset.start;
        const tripEnd = trip.dataset.end;

        let show = true;

        if(from && !tripFrom.includes(from)) show = false;
        if(to && !tripTo.includes(to)) show = false;
        if(start && tripStart < start) show = false;
        if(end && tripEnd > end) show = false;

        trip.style.display = show ? "block" : "none";
    });
});
</script>
